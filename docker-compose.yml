services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: superbrain
      POSTGRES_PASSWORD: superbrain
      POSTGRES_DB: superbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superbrain -d superbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
